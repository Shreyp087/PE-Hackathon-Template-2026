name: Pytest CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv pytest

      - name: Install project dependencies
        run: uv pip install --system -e .

      - name: Compile Python files
        run: python -m compileall app scripts run.py seed.py validate_seed.py

      - name: Run smoke tests
        run: pytest -q
