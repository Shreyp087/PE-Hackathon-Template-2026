groups:
  - name: url-shortener-alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="url-shortener"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Link-Shrink is DOWN
          description: The Prometheus scrape target for Link-Shrink has been unavailable for at least one minute.

      - alert: HighErrorRate
        expr: (sum(rate(http_requests_total{status=~"[45].."}[2m])) / sum(rate(http_requests_total[2m]))) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: High 4xx/5xx error rate
          description: More than 5 percent of HTTP responses have been 4xx or 5xx for at least two minutes.

      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, endpoint)) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: P95 latency > 1s
          description: The p95 HTTP request latency has stayed above one second for at least two minutes.

      - alert: HighCPU
        expr: sum(rate(process_cpu_seconds_total{job="url-shortener"}[2m])) > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: High CPU usage
          description: CPU utilization for Link-Shrink has remained above 90 percent for at least two minutes.
