global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: url-shortener
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - app:5000
